<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WA Gateway PRO{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #111827;
            --accent-color: #6366f1;
            --card-border: rgba(0,0,0,0.05);
            --bg-main: #f9fafb;
        }
        body { 
            background-color: var(--bg-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1f2937;
        }
        .sidebar { 
            height: 100vh; 
            background-color: var(--sidebar-bg); 
            color: white; 
            padding: 24px 16px;
            position: fixed;
            width: 260px;
            z-index: 100;
        }
        .sidebar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: white;
            padding: 0 12px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
        }
        .sidebar-brand i { color: var(--accent-color); font-size: 1.5rem; margin-right: 12px; }
        .sidebar a { 
            color: #9ca3af; 
            text-decoration: none; 
            display: flex; 
            align-items: center;
            padding: 12px 16px; 
            border-radius: 8px;
            transition: all 0.2s;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .sidebar a i { margin-right: 12px; font-size: 1.2rem; }
        .sidebar a:hover, .sidebar a.active { 
            color: white; 
            background-color: rgba(99, 102, 241, 0.15); 
        }
        .sidebar a.active { color: white; background-color: var(--accent-color); }
        
        .main-content { 
            margin-left: 260px;
            padding: 40px; 
        }
        .card {
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            margin-bottom: 24px;
        }
        .btn-primary {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .stats-card {
            padding: 24px;
            border-radius: 16px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .stats-card .icon-bg {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 5rem;
            opacity: 0.15;
        }
        .badge-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        @media (max-width: 991px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>
    {% if request.session.get('user') %}
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-whatsapp"></i>
            <span>WA GATEWAY PRO</span>
        </div>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
            <i class="bi bi-grid-1x2"></i> Dashboard
        </a>
        <a href="/devices" class="{% if request.url.path == '/devices' %}active{% endif %}">
            <i class="bi bi-phone"></i> Devices
        </a>
        <a href="/tools" class="{% if request.url.path == '/tools' %}active{% endif %}">
            <i class="bi bi-rocket-takeoff"></i> Advanced Tools
        </a>
        <a href="/blast" class="{% if request.url.path == '/blast' %}active{% endif %}">
            <i class="bi bi- megaphone"></i> Message Blast
        </a>
        <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">
            <i class="bi bi-chat-left-text"></i> Message Logs
        </a>
        
        <div style="margin-top: auto; padding-top: 40px;">
            <a href="/logout" class="text-danger">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    {% else %}
    <div class="container">
        {% block login_content %}{% endblock %}
    </div>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
